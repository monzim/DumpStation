# =============================================================================
# Web Docker Build and Push to GHCR
#
# Single-platform (linux/amd64) build — the JS install + bundle step is heavy
# enough that cross-compiling to arm64 via QEMU on a single runner was making
# this workflow take ~7 minutes. amd64 covers the vast majority of self-hosting
# targets; if arm64 is ever needed back, restore the matrix pattern used by
# .github/workflows/docker-build-push.yml (server image) — it's the same shape.
# =============================================================================

name: Build and Push Web App to GHCR

on:
    push:
        branches:
            - main
            - master
        paths:
            - "web/**"
            - ".github/workflows/web-docker-build.yml"
    pull_request:
        branches:
            - main
            - master
        paths:
            - "web/**"
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: monzim/dumpstation/web

jobs:
    build-and-push:
        name: Build linux/amd64
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha,prefix=sha-,format=short
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push image
              uses: docker/build-push-action@v6
              with:
                  context: ./web
                  file: ./web/Dockerfile
                  platforms: linux/amd64
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=web-amd64
                  cache-to: type=gha,mode=max,scope=web-amd64
